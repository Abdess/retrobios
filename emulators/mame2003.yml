    system: deco-cassette
    source_ref: "src/drivers/decocass.c:1086"

  # Nintendo PlayChoice-10
  - name: playch10.zip
    required: true
    category: bios_zip
    system: nintendo-playch10
    source_ref: "src/drivers/playch10.c:1680"

  # Nintendo Super System
  - name: nss.zip
    required: true
    category: bios_zip
    system: nintendo-nss
