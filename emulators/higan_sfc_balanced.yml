emulator: "nSide (SFC Balanced)"
type: libretro
core_classification: enhanced_fork
source: "https://github.com/libretro/nSide"
upstream: "https://gitlab.com/higan/higan"
profiled_date: "2026-03-23"
core_version: "v105 (Super Famicom Balanced)"
display_name: "Nintendo - SNES / Famicom (nSide Balanced)"
cores:
  - higan_sfc_balanced
systems:
  - nintendo-snes
  - nintendo-sgb

notes: |
  Fork of higan v106 by hex-usr, renamed at byuu's request. Balanced
  PPU profile (scanline-precision, faster than dot-based accuracy).
  Coprocessor firmware loaded via icarus manifest system from system_dir.
  File names follow icarus convention: {identifier}.{content}.rom.
  SGB emulation loads from SGB1.sfc/ or SGB2.sfc/ subdirectories,
  with fallback to SGB.sfc/ and Super GameBoy.sfc/.

