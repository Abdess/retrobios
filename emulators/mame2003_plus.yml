    category: bios_zip
    system: sega-stv
    note: "ST-V (Saturn-based arcade) BIOS, 6 region variants"
    source_ref: "src/drivers/stv.c:3741-3767"
    contents:
      - name: epr19730.ic8
        description: Japan
      - name: mp17951a.s
        description: Japan alt
      - name: mp17952a.s
        description: USA
      - name: 20091.bin
        description: Japan alt 2
      - name: mp17953a.ic8
        description: Taiwan
      - name: mp17954a.s
        description: Europe

