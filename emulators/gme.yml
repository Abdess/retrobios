notes: >
  Libretro wrapper around Blargg's Game Music Emu library.
  Plays chiptune music files: NSF/NSFE (NES), SPC (SNES), GBS (Game Boy),
  VGM/VGZ (Sega), HES (PC Engine), AY (ZX Spectrum), SAP (Atari),
  KSS (MSX), GYM (Genesis). Loads music files as content.
