emulator: MAME 2016
type: libretro
core_classification: frozen_snapshot
source: "https://github.com/libretro/mame2016-libretro"
upstream: "https://github.com/mamedev/mame/tree/mame0174"
logo: "https://raw.githubusercontent.com/mamedev/mame/master/docs/source/images/MAMElogo.svg"
profiled_date: "2026-03-22"
core_version: "0.174"

cores:
  - mame2016
  - mess2016

display_name: "Arcade (MAME 2016)"
mame_version: "0.174"
systems:
  - snk-neogeo-mvs
  - snk-neogeo-aes
  - igs-pgm
  - sega-naomi
  - sega-naomi2
  - sega-naomigd
  - sammy-atomiswave
  - sega-stv
  - sega-lindbergh
  - sega-hikaru
  - sega-chihiro
  - sega-triforce
  - deco-cassette
  - nintendo-playch10
  - sega-megaplay
  - sega-megatech
  - nintendo-sfcbox
  - nintendo-nss
  - philips-cdi
  - commodore-cubo
  - namco-system246
  - namco-system256
  - namco-system573
  - konami-viper
  - taito-gnet
  - super-kaneko-nova
  - capcom-zn1
  - capcom-zn2
  - konami-gv
  - panasonic-3do
  - hyper-neogeo64
  - konami-twinkle

notes: |
  Frozen snapshot of MAME 0.174 (mid-2016). 69 BIOS root sets. Upstream
  comparison (tag mame0174): BIOS root sets identical, romload.cpp unmodified,
  no hiscore.c added. Shallowest libretro fork.

  Cheats use per-game XML files loaded from system_dir/mame2016/cheat/.
  Samples in system_dir/mame2016/samples/.
  Artwork in system_dir/mame2016/artwork/.
  Software list hash XMLs in system_dir/mame2016/hash/ (437 files).

  ROM naming follows MAME 0.174 conventions.

files:
  # SNK Neo Geo MVS/AES
  - name: neogeo.zip
    required: true
    category: bios_zip
    system: snk-neogeo-mvs
    source_ref: "src/mame/drivers/neogeo.cpp:2033"
    contents:
      - name: sp-s2.sp1
        description: Europe MVS v2, default
      - name: sp-u2.sp1
        description: US MVS v2
      - name: asia-s3.rom
        description: Asia MVS v3
      - name: vs-bios.rom
        description: Japan MVS v6 VS
      - name: sp-45.sp1
        description: MV1C Asia
        size: 524288
      - name: sm1.sm1
        description: Z80 sound, always required
      - name: sfix.sfix
        description: fix tiles, always required
      - name: 000-lo.lo
        description: zoom table, always required
      - name: uni-bios_3_2.rom
        description: Universe BIOS 3.2, hack

